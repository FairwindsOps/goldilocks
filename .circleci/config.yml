version: 2.1

orbs:
  rok8s: fairwinds/rok8s-scripts@14
  oss-docs: fairwinds/oss-docs@0

references:
  install_vault: &install_vault
    run:
      name: install hashicorp vault
      command: |
        apk --update add curl yq
        cd /tmp
        curl -LO https://releases.hashicorp.com/vault/1.21.4/vault_1.21.4_linux_amd64.zip
        sha256sum vault_1.21.4_linux_amd64.zip | grep 889b681990fe221b884b7932fa9c9dd0ee9811b9349554f1aa287ab63c9f3dae
        unzip vault_1.21.4_linux_amd64.zip
        mv vault /usr/bin/vault
  install_vault_machine: &install_vault_machine
    run:
      name: install hashicorp vault
      command: |
        sudo apt-get update -y && sudo apt-get install -y curl unzip
        cd /tmp
        curl -LO https://releases.hashicorp.com/vault/1.21.4/vault_1.21.4_linux_amd64.zip
        echo '889b681990fe221b884b7932fa9c9dd0ee9811b9349554f1aa287ab63c9f3dae  vault_1.21.4_linux_amd64.zip' | sha256sum -c
        unzip -o vault_1.21.4_linux_amd64.zip
        sudo mv vault /usr/bin/vault
  setup_qemu_binfmt: &setup_qemu_binfmt
    run:
      name: Setup QEMU for multi-arch Docker builds
      command: |
        sudo apt-get update -y
        sudo apt-get install -y qemu-user-static binfmt-support
        docker buildx create --use || true
        docker buildx inspect --bootstrap
  e2e_configuration: &e2e_configuration
    pre_script: e2e/pre.sh
    script: e2e/run.sh
    command_runner_image: quay.io/reactiveops/ci-images:v14.1-bullseye
    enable_docker_layer_caching: true
    store-test-results: /tmp/test-results
    attach-workspace: true
    requires:
      - test
      - snapshot
    filters:
      branches:
        only: /.*/
      tags:
        ignore: /v.*/

jobs:
  test:
    working_directory: /home/circleci/go/src/github.com/fairwindsops/goldilocks
    docker:
      - image: cimg/go:1.26.0
        environment:
          GL_DEBUG: linters_output
          GOPACKAGESPRINTGOLISTERRORS: "1"
    steps:
      - checkout
      - run:
          name: golangci-lint
          environment:
            GOLANGCI_LINT_VERSION: 2.10.1
            GOLANGCI_LINT_CHECKSUM: dfa775874cf0561b404a02a8f4481fc69b28091da95aa697259820d429b09c99
          command: |
            curl -OL https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_LINT_VERSION}/golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64.tar.gz
            [[ "$(sha256sum golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64.tar.gz)" == "${GOLANGCI_LINT_CHECKSUM}  golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64.tar.gz" ]]
            tar xzf golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64.tar.gz && mv golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64/golangci-lint $(go env GOPATH)/bin/golangci-lint
            go mod tidy
            golangci-lint run -v --timeout 2m0s
      - run:
          name: Run Tests
          command: make test

  build_and_release:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    shell: /bin/bash
    steps:
      - checkout
      - *install_vault_machine
      - rok8s/get_vault_env:
          vault_path: repo/global/env
      - *setup_qemu_binfmt
      - run:
          name: Run GoReleaser release
          command: |
            set -e
            REPO_ROOT="$(pwd)"
            git rev-parse --is-inside-work-tree >/dev/null 2>&1 || { echo "Not a git repository (run from repo root). pwd=$(pwd)"; exit 1; }
            export GORELEASER_CURRENT_TAG="${CIRCLE_TAG}"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /root/.docker:/root/.docker \
              -v "${REPO_ROOT}:/workspace" -w /workspace \
              -e GORELEASER_CURRENT_TAG -e CIRCLE_TAG -e CIRCLE_SHA1 -e GITHUB_TOKEN -e GCP_ARTIFACTREADWRITE_JSON_KEY \
              --entrypoint sh \
              goreleaser/goreleaser:v2.14.2 \
              -c 'tmp=$(mktemp) && chmod 600 "$tmp" && printf "%s" "$GCP_ARTIFACTREADWRITE_JSON_KEY" | base64 -d > "$tmp" && docker login -u _json_key --password-stdin us-docker.pkg.dev < "$tmp" && rm -f "$tmp" && goreleaser --skip=sign'
  release_dry_run:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    shell: /bin/bash
    steps:
      - checkout
      - *install_vault_machine
      - rok8s/get_vault_env:
          vault_path: repo/global/env
      - *setup_qemu_binfmt
      - run:
          name: Run GoReleaser release (dry run – no publish)
          command: |
            set -e
            REPO_ROOT="$(pwd)"
            git rev-parse --is-inside-work-tree >/dev/null 2>&1 || { echo "Not a git repository (run from repo root). pwd=$(pwd)"; exit 1; }
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /root/.docker:/root/.docker \
              -v "${REPO_ROOT}:/workspace" -w /workspace \
              -e CIRCLE_SHA1 -e CIRCLE_BRANCH -e CIRCLE_TAG -e GITHUB_TOKEN -e GCP_ARTIFACTREADWRITE_JSON_KEY \
              --entrypoint sh \
              goreleaser/goreleaser:v2.14.2 \
              -c 'tmp=$(mktemp) && chmod 600 "$tmp" && printf "%s" "$GCP_ARTIFACTREADWRITE_JSON_KEY" | base64 -d > "$tmp" && docker login -u _json_key --password-stdin us-docker.pkg.dev < "$tmp" && rm -f "$tmp" && goreleaser --snapshot --skip=sign --skip=publish'
      - store_artifacts:
          path: dist
          destination: release-dry-run
  snapshot:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - checkout
      - *setup_qemu_binfmt
      - run:
          name: Run GoReleaser snapshot
          command: |
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$(pwd):/workspace" -w /workspace \
              -e CIRCLE_SHA1 -e CIRCLE_BRANCH -e CIRCLE_TAG \
              goreleaser/goreleaser:v2.14.2 --snapshot --skip=sign
      - run: mkdir -p /tmp/workspace/docker_save/
      - run: docker save us-docker.pkg.dev/fairwinds-ops/oss/goldilocks:${CIRCLE_SHA1}-amd64 > /tmp/workspace/docker_save/goldilocks_${CIRCLE_SHA1}-amd64.tar
      - persist_to_workspace:
          root: /tmp/workspace/
          paths:
          - docker_save
      - store_artifacts:
          path: dist
          destination: snapshot

workflows:
  version: 2
  tests:
    jobs:
      - test
      - snapshot:
          context: org-global
          requires:
            - test
      - rok8s/kubernetes_e2e_tests:
          name: "End-To-End Kubernetes 1.31"
          kind_node_image: "kindest/node:v1.31.6@sha256:28b7cbb993dfe093c76641a0c95807637213c9109b761f1d422c2400e22b8e87"
          <<: *e2e_configuration
      - rok8s/kubernetes_e2e_tests:
          name: "End-To-End Kubernetes 1.32"
          kind_node_image: "kindest/node:v1.32.2@sha256:f226345927d7e348497136874b6d207e0b32cc52154ad8323129352923a3142f"
          <<: *e2e_configuration
      - rok8s/kubernetes_e2e_tests:
          name: "End-To-End Kubernetes 1.33"
          kind_node_image: "kindest/node:v1.33.1@sha256:8d866994839cd096b3590681c55a6fa4a071fdaf33be7b9660e5697d2ed13002"
          <<: *e2e_configuration
      - rok8s/kubernetes_e2e_tests:
          name: "End-To-End Kubernetes 1.34"
          kind_node_image: "kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a"
          <<: *e2e_configuration
  release:
    jobs:
      - build_and_release:
          context: org-global
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v.*/
      - oss-docs/publish-docs:
          repository: goldilocks
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^.*/
  release-dry-run:
    jobs:
      - release_dry_run:
          context: org-global
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
